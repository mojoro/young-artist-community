name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-safety:
    name: Migration safety
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan new migrations for destructive SQL
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t NEW_FILES < <(git diff --name-only --diff-filter=AM "$BASE_SHA...$HEAD_SHA" -- 'prisma/migrations/*/migration.sql')
          if [ "${#NEW_FILES[@]}" -eq 0 ]; then
            echo "No new or modified migration files in this PR."
            exit 0
          fi
          echo "Scanning ${#NEW_FILES[@]} migration file(s) for destructive SQL:"
          printf '  - %s\n' "${NEW_FILES[@]}"
          # Multi-DB setup (Supabase prod + Neon preview/dev) exists to protect
          # against data loss. DROP TABLE and DROP COLUMN destroy production
          # data on merge; require explicit maintainer review instead of
          # letting them slip through.
          PATTERN='DROP[[:space:]]+TABLE|DROP[[:space:]]+COLUMN'
          if matches=$(grep -E -i -H -n "$PATTERN" "${NEW_FILES[@]}"); then
            echo "::error::Destructive migration detected. Coordinate with the maintainer before merging."
            echo "$matches" | while IFS= read -r line; do
              echo "::error file=${line%%:*}::${line}"
            done
            exit 1
          fi
          echo "No destructive SQL detected."

  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc --noEmit
      - run: npm test
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: E2E Tests
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Wait for Vercel preview deployment
        id: vercel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # Poll for a successful Vercel deployment on this commit.
          # Vercel registers a GitHub "deployment" object with an empty payload,
          # then creates a deployment *status* with state=success once the build
          # finishes.  The preview URL lives in the status's environment_url field.
          SHA="${{ github.event.pull_request.head.sha }}"
          for i in $(seq 1 150); do
            DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments?sha=${SHA}&environment=Preview" \
              --jq '.[0].id // empty' 2>/dev/null || true)
            if [ -n "$DEPLOY_ID" ]; then
              # Check for failed deployment
              FAILED=$(gh api "repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses" \
                --jq '[.[] | select(.state == "failure" or .state == "error")][0].state // empty' 2>/dev/null || true)
              if [ -n "$FAILED" ]; then
                echo "::error::Vercel deployment $DEPLOY_ID failed with state: $FAILED"
                exit 1
              fi
              URL=$(gh api "repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses" \
                --jq '[.[] | select(.state == "success")][0].environment_url // empty' 2>/dev/null || true)
              if [ -n "$URL" ]; then
                STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
                  -H "x-vercel-protection-bypass: ${BYPASS_SECRET}" "$URL")
                if [ "$STATUS" = "200" ]; then
                  echo "url=$URL" >> "$GITHUB_OUTPUT"
                  echo "Preview ready at $URL"
                  exit 0
                fi
                echo "Attempt $i: deployment $DEPLOY_ID ready but HTTP $STATUS"
              else
                echo "Attempt $i: deployment $DEPLOY_ID exists but no successful status yet"
              fi
            else
              echo "Attempt $i: no deployment yet"
            fi
            sleep 4
          done
          echo "::error::Timed out waiting for Vercel preview"
          exit 1

      - name: Cache Playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.vercel.outputs.url }}
          ADMIN_TOKEN: ${{ secrets.TEST_ADMIN_TOKEN }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
